---
layout: default
---
<article class="terminal-page">
  <header class="page-header">
    <h1 class="page-title"><span class="prompt">$</span> {{ page.title }}</h1>
    <hr class="terminal-divider">
  </header>

  <div class="page-body">
    {{ content }}
  </div>
</article>

<style>
  .prompt { color: #60ff60; }
  .terminal-divider { border: 0; border-top: 2px dashed #333; margin: 20px 0; }
  .page-body { font-size: 0.95em; line-height: 1.6; }
</style>
