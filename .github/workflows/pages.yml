name: Deploy Jekyll Site to GitHub Pages

on:
  push:
    branches: ["main"] # Triggers every time you push code to your main branch
  workflow_dispatch:  # Allows manual triggers from the GitHub Actions dashboard

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Ruby Development Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true # Caches dependencies to make builds incredibly fast

      - name: Setup Pages Configuration
        id: pages
        uses: actions/configure-pages@v4

      - name: Build Site Assets with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps:pages.outputs.baseurl }}"
        env:
          JEKYLL_ENV: production

      - name: Upload Compiled Static Site Artifacts
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps:deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publish Build to Live Servers
        id: deployment
        uses: actions/deploy-pages@v4

